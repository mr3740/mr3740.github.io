<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #layer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="layer"></div>
    <script src="https://ssl.daumcdn.net/dmaps/map_js_init/postcode.v2.js"></script>
    <script>
        window.onload = function() {
            var element_layer = document.getElementById('layer');

            new daum.Postcode({
                oncomplete: function(data) {
                    var fullAddr = '';
                    var extraAddr = '';

                    if (data.userSelectedType === 'R') {
                        if (data.userLanguageType === 'K') {
                            fullAddr += data.roadAddress;
                            if (data.bname !== '') extraAddr += data.bname;
                            if (data.buildingName !== '') {
                                extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                            }
                            fullAddr += (extraAddr !== '' ? ' (' + extraAddr + ')' : '');
                        } else {
                            fullAddr += data.roadAddressEnglish;
                        }
                    } else {
                        if (data.userLanguageType === 'K') {
                            fullAddr += data.jibunAddress;
                        } else {
                            fullAddr += data.jibunAddressEnglish;
                        }
                    }

                    window.WebViewBridge.setZoneCode(data.zonecode);
                    window.WebViewBridge.setFullAddress(fullAddr);
                    window.WebViewBridge.setClosePopup('true');
                },
                width: '100%',
                height: '100%'
            }).embed(element_layer, { autoClose: false });
        };
    </script>
</body>
</html>
